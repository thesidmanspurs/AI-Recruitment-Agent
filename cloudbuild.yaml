# Cloud Build pipeline: build container → push to Artifact Registry → deploy to Cloud Run.
#
# Trigger one-shot from terminal:
#   gcloud builds submit --config cloudbuild.yaml --project ai-recruitment-agent-496912
#
# Substitutions (override with --substitutions=_REGION=us-central1,...):
#   _REGION          GCP region for Cloud Run + Artifact Registry  (default: us-central1)
#   _SERVICE         Cloud Run service name                          (default: ai-recruitment-agent)
#   _AR_REPO         Artifact Registry repo name                     (default: containers)
#   _CLOUDSQL_CONN   Cloud SQL instance connection name              (default: PROJECT:REGION:INSTANCE — set via flag)

substitutions:
  _REGION: us-central1
  _SERVICE: ai-recruitment-agent
  _AR_REPO: containers
  _CLOUDSQL_CONN: ''   # required at submit time, e.g. ai-recruitment-agent-496912:us-central1:agent-db

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  # ── 1. Build the container ──────────────────────────────────────────────────
  - id: docker-build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA
      - --tag=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest
      - --cache-from=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest
      - .

  # ── 2. Push to Artifact Registry ────────────────────────────────────────────
  - id: docker-push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}

  # ── 3. Deploy to Cloud Run ──────────────────────────────────────────────────
  # Env vars and secrets are wired here. Secrets must already exist in Secret
  # Manager — see DEPLOY.md for the one-time setup commands.
  - id: cloud-run-deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=1Gi
      - --cpu=1
      - --min-instances=1
      - --max-instances=3
      - --timeout=300
      - --add-cloudsql-instances=${_CLOUDSQL_CONN}
      - --set-env-vars=NODE_ENV=production,JWT_EXPIRES_IN=7d,ALERT_THRESHOLD_HOURS=48,SMTP_PORT=587,GOOGLE_REDIRECT_URI=https://ai-recruitment-agent-hxuvu2n4za-uc.a.run.app/api/callback
      - --update-secrets=DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,APOLLO_API_KEY=APOLLO_API_KEY:latest,APOLLO_PEOPLE_SEARCH_KEY=APOLLO_PEOPLE_SEARCH_KEY:latest,APOLLO_BULK_MATCH_KEY=APOLLO_BULK_MATCH_KEY:latest,APOLLO_ORG_SEARCH_KEY=APOLLO_ORG_SEARCH_KEY:latest,APOLLO_ORG_ENRICH_KEY=APOLLO_ORG_ENRICH_KEY:latest,CORS_ORIGIN=CORS_ORIGIN:latest,APP_BASE_URL=APP_BASE_URL:latest,APOLLO_WEBHOOK_SECRET=APOLLO_WEBHOOK_SECRET:latest,REDDIT_CLIENT_ID=REDDIT_CLIENT_ID:latest,REDDIT_CLIENT_SECRET=REDDIT_CLIENT_SECRET:latest,REDDIT_USER_AGENT=REDDIT_USER_AGENT:latest,ENCRYPTION_KEY=ENCRYPTION_KEY:latest,ADMIN_EMAILS=ADMIN_EMAILS:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_PUBLISHABLE_KEY=STRIPE_PUBLISHABLE_KEY:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:latest

timeout: 1200s
